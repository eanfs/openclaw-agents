# 电商营销视频生成工作流

## 流程概述

```
用户输入 → [主Agent] → [营销策划] → [视频导演] → [质量评估] → [合成发布] → 最终视频
              ↓
           协调调度
```

## 阶段定义

### 阶段1：任务接收 (multimedia-agent)
- **输入**：商品链接/信息、目标平台、数量要求
- **处理**：解析任务、分发给 market-agent
- **输出**：任务确认、阶段状态

### 阶段2：营销策划 (market-agent)
- **输入**：商品信息、目标平台
- **处理**：市场分析、卖点提炼、创意生成
- **输出**：营销策略、3-5个视频创意概念

### 阶段3：视频导演 (director-agent)
- **输入**：选定的创意概念、营销策略
- **处理**：脚本生成、分镜设计、素材生成
- **输出**：视频脚本、素材文件列表

### 阶段4：质量评估 (evaluate-agent)
- **输入**：脚本和素材
- **处理**：技术检测、内容分析、合规检查
- **输出**：评估报告、筛选后的素材

### 阶段5：合成发布 (release-agent)
- **输入**：通过评估的素材
- **处理**：视频合成、格式适配、平台发布
- **输出**：最终视频、发布结果

## 状态流转

```
CREATED → DISPATCHED → RUNNING → COMPLETED/FAILED
                         ↓
                      PAUSED (等待用户确认)
```

## 重试机制

| 阶段 | 最大重试 | 间隔 |
|-----|---------|------|
| market-agent | 2 | 30s |
| director-agent | 3 | 60s |
| evaluate-agent | 2 | 30s |
| release-agent | 2 | 30s |

## 超时配置

| 阶段 | 超时时间 |
|-----|---------|
| market-analysis | 300s |
| generate-video | 600s |
| evaluate-quality | 300s |
| synthesize-release | 300s |